name: Daily House Forecast Update

on:
  workflow_dispatch:
  schedule:
    - cron: '15 10 * * *'

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast refresh
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          if [ -n "$FEC_API_KEY" ]; then
            python scripts/run_update.py --fec-api-key "$FEC_API_KEY"
          else
            python scripts/run_update.py --no-fec
          fi

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history/ data/runtime/latest/
          if git diff --cached --quiet; then
            echo "No forecast changes to commit."
          else
            git commit -m "Update daily House forecast"
            git push
          fi
